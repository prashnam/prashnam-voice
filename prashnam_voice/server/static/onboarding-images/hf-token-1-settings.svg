<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" role="img" aria-label="HF settings page with Access Tokens highlighted and the Create new token button">
  <defs>
    <filter id="ds1" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <marker id="ah1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c8341a"/>
    </marker>
  </defs>
  <rect width="640" height="320" fill="#f9f8f4" rx="8"/>
  <g filter="url(#ds1)">
    <rect x="32" y="24" width="576" height="272" rx="6" fill="#ffffff" stroke="#d4d0c4"/>
    <rect x="32" y="24" width="576" height="32" rx="6" fill="#f0eee7"/>
    <circle cx="48" cy="40" r="4" fill="#cfcabb"/>
    <circle cx="62" cy="40" r="4" fill="#cfcabb"/>
    <circle cx="76" cy="40" r="4" fill="#cfcabb"/>
    <rect x="100" y="32" width="320" height="16" rx="3" fill="#ffffff" stroke="#e6e3da"/>
    <text x="110" y="44" font-family="ui-monospace,monospace" font-size="10" fill="#7c7669">huggingface.co/settings/tokens</text>
  </g>
  <!-- Sidebar -->
  <rect x="48" y="72" width="160" height="208" fill="#fafaf6"/>
  <text x="60" y="92" font-family="-apple-system,sans-serif" font-size="11" fill="#7c7669">Profile</text>
  <text x="60" y="114" font-family="-apple-system,sans-serif" font-size="11" fill="#7c7669">Organizations</text>
  <text x="60" y="136" font-family="-apple-system,sans-serif" font-size="11" fill="#7c7669">Billing</text>
  <!-- Highlighted item -->
  <rect x="52" y="148" width="152" height="22" rx="4" fill="#d8e0f0" stroke="#1a3a78" stroke-width="1.5"/>
  <text x="60" y="164" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="#1a3a78">Access Tokens</text>
  <text x="60" y="190" font-family="-apple-system,sans-serif" font-size="11" fill="#7c7669">Webhooks</text>
  <text x="60" y="212" font-family="-apple-system,sans-serif" font-size="11" fill="#7c7669">SSH &amp; GPG</text>
  <!-- Main content -->
  <text x="232" y="92" font-family="-apple-system,sans-serif" font-size="14" font-weight="700" fill="#1a1a18">Access Tokens</text>
  <text x="232" y="110" font-family="-apple-system,sans-serif" font-size="11" fill="#7c7669">User Access Tokens are used to authenticate your identity to the Hub.</text>
  <!-- Empty token list placeholder -->
  <rect x="232" y="124" width="356" height="80" rx="4" fill="#fafaf6" stroke="#e6e3da" stroke-dasharray="3 2"/>
  <text x="410" y="170" font-family="-apple-system,sans-serif" font-size="11" fill="#7c7669" text-anchor="middle">(no tokens yet)</text>
  <!-- Create new token button (HIGHLIGHTED) -->
  <g>
    <rect x="226" y="220" width="180" height="40" rx="22" fill="none" stroke="#c8341a" stroke-width="3" stroke-dasharray="4 3"/>
    <rect x="234" y="224" width="164" height="32" rx="16" fill="#1a3a78"/>
    <text x="316" y="245" font-family="-apple-system,sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">+ Create new token</text>
  </g>
  <g>
    <path d="M 470 240 L 420 240" stroke="#c8341a" stroke-width="2" fill="none" marker-end="url(#ah1)"/>
    <text x="478" y="244" font-family="-apple-system,sans-serif" font-size="13" font-weight="700" fill="#c8341a">Click this</text>
  </g>
  <!-- Step badge -->
  <circle cx="56" cy="296" r="10" fill="#1a3a78"/>
  <text x="56" y="300" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
  <text x="74" y="300" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="#1a3a78">Open Access Tokens, click "Create new token"</text>
</svg>
