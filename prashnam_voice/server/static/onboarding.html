<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>prashnam-voice — setup</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="/static/onboarding.css" />
</head>
<body class="onboarding-page">
  <header class="topbar">
    <a href="/" class="brand">prashnam-voice</a>
    <span class="sub">First-time setup</span>
  </header>

  <main class="onboarding-shell">
    <aside class="onboarding-rail">
      <ol id="rail-steps"></ol>
    </aside>
    <section class="onboarding-stage" id="stage"></section>
  </main>

  <!-- Step templates ----------------------------------------------------- -->

  <template id="step-pick-engine">
    <h2>Pick how you want to generate audio</h2>
    <p class="muted">You can switch later from Project Settings.</p>
    <div class="engine-options">
      <label class="engine-card">
        <input type="radio" name="engine" value="local" checked />
        <div>
          <strong>Run on this computer</strong> <span class="badge-info">recommended</span>
          <p class="muted">Free, private, offline after a one-time ~4.9 GB model download.
            No account, no token, no click-through — weights are mirrored ungated.</p>
        </div>
      </label>
      <label class="engine-card">
        <input type="radio" name="engine" value="sarvam" />
        <div>
          <strong>Sarvam.ai (cloud)</strong>
          <p class="muted">Indic-first cloud TTS — pay per call. No big download.
            You'll need an API key from dashboard.sarvam.ai.</p>
        </div>
      </label>
    </div>
    <div class="actions"><button class="primary" id="btn-pick-next">Continue →</button></div>
  </template>

  <template id="step-download">
    <h2>Download local models</h2>
    <p>One-time download (~4.9 GB). After this finishes the app runs fully
      offline. The translator (~1.1 GB) downloads first, then the TTS
      model (~3.8 GB). No login or token required — we pull from public
      mirrors of the AI4Bharat weights at <code>naklitechie/*</code>.</p>
    <div id="download-status">
      <div class="model-progress" data-model="naklitechie/indictrans2-en-indic-dist-200M">
        <div class="model-row">
          <strong>IndicTrans2</strong>
          <span class="muted small status-text">queued…</span>
        </div>
        <progress value="0" max="100"></progress>
        <span class="muted small bytes"></span>
      </div>
      <div class="model-progress" data-model="naklitechie/indic-parler-tts">
        <div class="model-row">
          <strong>Indic Parler-TTS</strong>
          <span class="muted small status-text">queued…</span>
        </div>
        <progress value="0" max="100"></progress>
        <span class="muted small bytes"></span>
      </div>
    </div>
    <p class="muted small" id="download-error" hidden></p>
    <div class="actions">
      <button class="ghost" data-back>← Back</button>
      <button class="ghost" id="btn-skip-download">Skip for now</button>
      <button class="primary" id="btn-download-next" data-next disabled>Continue →</button>
    </div>
  </template>

  <template id="step-sarvam-account">
    <h2>Sign in to Sarvam.ai</h2>
    <p>You'll need an account on dashboard.sarvam.ai (Google sign-in works) to generate an API key.</p>
    <div class="actions">
      <a class="button primary" target="_blank" rel="noopener"
         href="https://dashboard.sarvam.ai">Open dashboard.sarvam.ai →</a>
    </div>
    <div class="actions">
      <button class="ghost" data-back>← Back</button>
      <button class="primary" data-next>I'm signed in →</button>
    </div>
  </template>

  <template id="step-sarvam-key">
    <h2>Generate an API key</h2>
    <p>In the Sarvam dashboard, go to API keys → Create new key. Same key works for translate + TTS.</p>
    <label class="block">
      <span>Paste the key</span>
      <input type="password" id="sarvam-key" autocomplete="off" placeholder="sk_xxxxxxxxxxxx" />
    </label>
    <div class="actions">
      <button class="ghost" data-back>← Back</button>
      <button class="primary" id="btn-test-sarvam">Test connection</button>
    </div>
    <div id="sarvam-result" class="probe-result" hidden></div>
    <div class="actions">
      <button class="primary" data-next id="btn-sarvam-next" disabled>Finish setup →</button>
    </div>
  </template>

  <template id="step-done">
    <h2>You're set up ✓</h2>
    <p id="done-detail" class="muted"></p>
    <div class="actions">
      <a class="button primary" href="/">Open prashnam-voice →</a>
    </div>
  </template>

  <script src="/static/onboarding.js" type="module"></script>
</body>
</html>
